<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Review Policy</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .policy-card { 
            background: white; max-width: 800px; margin: 0 auto; 
            padding: 40px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); 
        }
        h1 { color: #4e54c8; border-bottom: 2px solid #eee; padding-bottom: 10px; }
        .content { line-height: 1.6; font-size: 16px; margin: 25px 0; color: #555; height: 300px; overflow-y: scroll; border: 1px solid #eee; padding: 15px; background: #fafafa; }
        .actions { display: flex; gap: 15px; margin-top: 30px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; font-size: 16px; transition: 0.3s; }
        .btn-agree { background: #27ae60; color: white; }
        .btn-agree:hover { background: #219150; }
        .btn-back { background: #95a5a6; color: white; }
    </style>
</head>
<body>

<div class="policy-card">
    <h1 id="policyTitle">Loading Policy...</h1>
    <div class="content" id="policyContent">
        Please wait while we load the document...
    </div>

    <div class="actions">
        <button class="btn-back" onclick="window.location.href='employee-dashboard.html'">Cancel</button>
        <button class="btn-agree" id="agreeBtn" onclick="submitAgreement()">I Read and Agree</button>
    </div>
</div>

<script>
    const API_BASE = "https://employee-policy-system.onrender.com/api/employee";
    const token = localStorage.getItem("employeeToken");

    // 1. Policy Database (The content)
    const policies = {
        code_of_conduct: {
            title: "Company Code of Conduct",
            text: "Employees must maintain professional behavior at all times. This includes respect for colleagues, punctuality, and maintaining company confidentiality. Discrimination or harassment of any kind will result in immediate termination."
        },
        remote_work: {
            title: "Remote Work Agreement",
            text: "Remote work is a privilege. Employees must be available during core hours (9 AM - 5 PM). You are responsible for maintaining a secure internet connection and protecting company hardware from damage."
        },
        data_privacy: {
            title: "Data Privacy Policy",
            text: "All customer data is strictly confidential. You are prohibited from downloading database records to personal devices. Any data breach caused by negligence will be investigated and handled legally."
        }
    };

    // 2. Identify which policy to show
    const urlParams = new URLSearchParams(window.location.search);
    const policyId = urlParams.get('id');

    if (!policies[policyId]) {
        alert("Policy not found!");
        window.location.href = 'employee-dashboard.html';
    } else {
        document.getElementById('policyTitle').innerText = policies[policyId].title;
        document.getElementById('policyContent').innerText = policies[policyId].text;
    }

    // 3. Submit the "Signed" status to the server
    async function submitAgreement() {
        const btn = document.getElementById('agreeBtn');
        btn.disabled = true;
        btn.innerText = "Processing...";

        try {
            const res = await fetch(`${API_BASE}/submit-policy`, {
                method: "POST",
                headers: { 
                    "Content-Type": "application/json",
                    "Authorization": `Bearer ${token}` 
                },
                body: JSON.stringify({ 
                    policyKey: policyId, 
                    status: "agreed" 
                })
            });

            if (res.ok) {
                alert("Thank you! Your agreement has been recorded.");
                window.location.href = 'employee-dashboard.html';
            } else {
                alert("Submission failed. Try again.");
                btn.disabled = false;
                btn.innerText = "I Read and Agree";
            }
        } catch (err) {
            alert("Connection error.");
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
