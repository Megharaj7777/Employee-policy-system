<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Admin Dashboard | Medical Management Portal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
<style>
    :root {
        --primary: #0984e3; 
        --secondary: #00b894; 
        --accent: #d63031;
        --bg: #f0f4f8;
        --white: #ffffff;
        --text-main: #2d3436;
        --success: #27ae60;
        --danger: #e74c3c;
    }

    body { margin: 0; font-family: 'Poppins', sans-serif; background: var(--bg); color: var(--text-main); overflow-x: hidden; }

    /* 🏥 Floating Medical Icons */
    .medical-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: linear-gradient(135deg, #f0f4f8 0%, #d9e2ec 100%); }
    .floating-icon { position: absolute; color: rgba(9, 132, 227, 0.08); animation: float 20s infinite linear; pointer-events: none; }
    @keyframes float { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 1; } 90% { opacity: 1; } 100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; } }

    /* 🛡️ Header */
    .logo-header {
        position: fixed; top: 0; left: 0; right: 0; height: 70px;
        background: var(--white); display: flex; align-items: center;
        justify-content: space-between; padding: 0 40px;
        box-shadow: 0 2px 15px rgba(0,0,0,0.1); z-index: 1000;
    }
    .brand { display: flex; align-items: center; gap: 10px; font-weight: 600; color: var(--primary); font-size: 20px; }
    .logout-btn { background: var(--danger); color: white; border: none; padding: 10px 18px; border-radius: 8px; cursor: pointer; font-weight: 600; display: flex; align-items: center; gap: 8px; transition: 0.3s; }
    .logout-btn:hover { background: #c0392b; transform: translateY(-2px); }

    .navbar { background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%); padding: 120px 20px 80px; color: white; text-align: center; border-bottom-left-radius: 50% 20px; border-bottom-right-radius: 50% 20px; }

    .container { padding: 20px; max-width: 1200px; margin: -60px auto 40px; position: relative; z-index: 10; }
    
    /* 📊 Stats Section */
    .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 30px; }
    .stat-card { background: white; padding: 20px; border-radius: 16px; text-align: center; box-shadow: 0 10px 20px rgba(0,0,0,0.05); border-top: 4px solid var(--primary); }
    .stat-card h2 { margin: 10px 0; color: var(--primary); font-size: 28px; }
    .stat-card p { margin: 0; color: #64748b; font-size: 14px; font-weight: 600; }

    .card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); padding: 30px; border-radius: 16px; box-shadow: 0 15px 35px rgba(0,0,0,0.08); margin-bottom: 30px; }
    
    .input-group { display: flex; gap: 15px; flex-wrap: wrap; margin-top: 20px; }
    input { flex: 1; min-width: 200px; padding: 14px; border: 2px solid #e2e8f0; border-radius: 10px; outline: none; transition: 0.3s; }
    input:focus { border-color: var(--primary); }
    
    .btn-main { padding: 14px 28px; border: none; border-radius: 10px; background: var(--primary); color: white; cursor: pointer; font-weight: 600; transition: 0.3s; }
    .btn-main:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(9, 132, 227, 0.3); }

    /* 📈 Progress Bar in Table */
    .progress-container { width: 100%; background: #edf2f7; border-radius: 10px; height: 8px; margin-top: 5px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--secondary); transition: width 0.5s ease-in-out; }
    .percent-text { font-size: 12px; font-weight: 700; color: var(--text-main); }

    .table-wrapper { width: 100%; overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    th { background: #f8fafc; color: #64748b; font-size: 11px; text-transform: uppercase; padding: 18px; text-align: left; }
    td { padding: 18px; border-bottom: 1px solid #f1f5f9; }

    .hidden { display: none !important; }
</style>
</head>
<body>

<div class="medical-bg" id="bg"></div>

<header class="logo-header">
    <div class="brand"><i class="fas fa-file-medical"></i> <span>MedService Admin</span></div>
    <button class="logout-btn" onclick="logout()"><i class="fas fa-power-off"></i> Logout</button>
</header>

<div class="navbar">
    <h1><i class="fas fa-chart-line"></i> Compliance Dashboard</h1>
    <p>Real-time monitoring of medical staff policy acknowledgments</p>
</div>

<div class="container">
    <div class="stats-grid">
        <div class="stat-card">
            <p>TOTAL STAFF</p>
            <h2 id="totalCount">0</h2>
        </div>
        <div class="stat-card" style="border-top-color: var(--secondary);">
            <p>AVG. COMPLIANCE</p>
            <h2 id="avgCompliance">0%</h2>
        </div>
        <div class="stat-card" style="border-top-color: var(--warning);">
            <p>PENDING ACTIONS</p>
            <h2 id="pendingCount">0</h2>
        </div>
    </div>

    <div class="card" id="formCard">
        <h3 id="formTitle"><i class="fas fa-user-plus"></i> Register New Staff</h3>
        <div class="input-group">
            <input type="hidden" id="editEmpId">
            <input type="text" id="empIdInput" placeholder="Staff ID (e.g. MED-101)">
            <input type="text" id="nameInput" placeholder="Full Name">
            <input type="tel" id="phoneInput" placeholder="Phone Number">
            <button id="createBtn" class="btn-main" onclick="createEmployee()">Add Staff</button>
            <button id="updateBtn" class="btn-main hidden" style="background: var(--secondary);" onclick="submitUpdate()">Save Changes</button>
            <button id="cancelBtn" style="background:#a0aec0;" class="btn-main hidden" onclick="resetForm()">Cancel</button>
        </div>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3><i class="fas fa-users"></i> Staff Records</h3>
            <input type="text" id="searchInput" placeholder="Search name or ID..." onkeyup="filterEmployees()" style="max-width: 250px;">
        </div>
        
        <div class="table-wrapper">
            <table id="employeeTable">
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Name</th>
                        <th>Policy Compliance Status</th>
                        <th style="text-align: right;">Action</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
// Background Animation
function createIcons() {
    const bg = document.getElementById('bg');
    const icons = ['fa-heartbeat', 'fa-stethoscope', 'fa-pills', 'fa-user-md'];
    for(let i=0; i<12; i++) {
        const icon = document.createElement('i');
        icon.className = `fas ${icons[Math.floor(Math.random()*icons.length)]} floating-icon`;
        icon.style.left = Math.random() * 100 + 'vw';
        icon.style.fontSize = (Math.random() * 20 + 20) + 'px';
        icon.style.animationDuration = (Math.random() * 10 + 10) + 's';
        bg.appendChild(icon);
    }
}
createIcons();

const API_BASE = "https://employee-policy-system.onrender.com/api/admin";
const TOTAL_POLICIES = 9; // Based on your enum in User.js
const token = localStorage.getItem("adminToken");
let allEmployees = [];

async function fetchEmployees() {
    try {
        const res = await fetch(`${API_BASE}/employees`, { headers: { "Authorization": `Bearer ${token}` } });
        const data = await res.json();
        allEmployees = data.employees || [];
        renderDashboard();
    } catch (err) { console.error(err); }
}

function renderDashboard() {
    const tbody = document.getElementById("tableBody");
    tbody.innerHTML = "";
    
    let totalSigned = 0;

    allEmployees.forEach(emp => {
        const count = emp.policySubmissions?.length || 0;
        const percentage = Math.round((count / TOTAL_POLICIES) * 100);
        totalSigned += percentage;

        tbody.innerHTML += `
            <tr>
                <td><span style="font-weight:600; color:var(--primary)">${emp.employeeId || 'N/A'}</span></td>
                <td><strong>${emp.name}</strong><br><small style="color:#a0aec0">${emp.phone}</small></td>
                <td style="min-width: 200px;">
                    <div style="display:flex; justify-content:space-between; align-items:center">
                        <span class="percent-text">${percentage}% Complete</span>
                        <span style="font-size:10px; color:#64748b">${count}/${TOTAL_POLICIES} Policies</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-fill" style="width: ${percentage}%"></div>
                    </div>
                </td>
                <td style="text-align: right;">
                    <button class="btn-main" style="padding: 6px 12px; font-size: 12px; background:#ebf8ff; color:var(--primary);" onclick="prepareUpdate('${emp._id}')"><i class="fas fa-edit"></i></button>
                    <button class="btn-main" style="padding: 6px 12px; font-size: 12px; background:#fff5f5; color:var(--danger);" onclick="deleteEmployee('${emp._id}')"><i class="fas fa-trash"></i></button>
                </td>
            </tr>
        `;
    });

    // Update Stats
    document.getElementById("totalCount").innerText = allEmployees.length;
    document.getElementById("avgCompliance").innerText = allEmployees.length ? Math.round(totalSigned / allEmployees.length) + "%" : "0%";
    document.getElementById("pendingCount").innerText = allEmployees.filter(e => e.policySubmissions?.length < TOTAL_POLICIES).length;
}

// Prepare, Update, Create, Delete functions (Same as previous, just adding renderDashboard() call)
function prepareUpdate(id) {
    const emp = allEmployees.find(e => e._id === id);
    document.getElementById("editEmpId").value = emp._id;
    document.getElementById("empIdInput").value = emp.employeeId || "";
    document.getElementById("nameInput").value = emp.name;
    document.getElementById("phoneInput").value = emp.phone;
    document.getElementById("formTitle").innerHTML = '<i class="fas fa-edit"></i> Update Staff';
    document.getElementById("createBtn").classList.add("hidden");
    document.getElementById("updateBtn").classList.remove("hidden");
    document.getElementById("cancelBtn").classList.remove("hidden");
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function submitUpdate() {
    const mongoId = document.getElementById("editEmpId").value;
    const res = await fetch(`${API_BASE}/update-employee/${mongoId}`, {
        method: "PUT",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
        body: JSON.stringify({ 
            employeeId: document.getElementById("empIdInput").value,
            name: document.getElementById("nameInput").value,
            phone: document.getElementById("phoneInput").value
        })
    });
    if (res.ok) { resetForm(); fetchEmployees(); }
}

function resetForm() {
    document.getElementById("editEmpId").value = "";
    document.getElementById("empIdInput").value = "";
    document.getElementById("nameInput").value = "";
    document.getElementById("phoneInput").value = "";
    document.getElementById("formTitle").innerHTML = '<i class="fas fa-user-plus"></i> Register New Staff';
    document.getElementById("createBtn").classList.remove("hidden");
    document.getElementById("updateBtn").classList.add("hidden");
    document.getElementById("cancelBtn").classList.add("hidden");
}

async function createEmployee() {
    const res = await fetch(`${API_BASE}/create-employee`, {
        method: "POST",
        headers: { "Content-Type": "application/json", "Authorization": `Bearer ${token}` },
        body: JSON.stringify({ 
            employeeId: document.getElementById("empIdInput").value,
            name: document.getElementById("nameInput").value,
            phone: document.getElementById("phoneInput").value
        })
    });
    if (res.ok) { resetForm(); fetchEmployees(); }
}

async function deleteEmployee(id) {
    if(confirm("Delete record?")) {
        await fetch(`${API_BASE}/delete-employee/${id}`, { method: "DELETE", headers: { "Authorization": `Bearer ${token}` } });
        fetchEmployees();
    }
}

function filterEmployees() {
    const filter = document.getElementById("searchInput").value.toLowerCase();
    const rows = document.querySelectorAll("#tableBody tr");
    rows.forEach(row => { row.style.display = row.innerText.toLowerCase().includes(filter) ? "" : "none"; });
}

function logout() { localStorage.removeItem("adminToken"); window.location.replace("index.html"); }

if (token) fetchEmployees();
</script>
</body>
</html>
